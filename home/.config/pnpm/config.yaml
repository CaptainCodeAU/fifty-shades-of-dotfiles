# pnpm global configuration (pnpm 11+)
# ------------------------------------------------------------------------------
# Stow-managed; symlinked to:
#   Linux/WSL: ~/.config/pnpm/config.yaml         (pnpm's native XDG path)
#   macOS:     ~/Library/Preferences/pnpm/config.yaml -> ~/.config/pnpm/config.yaml
#              (the macOS bridge symlink is created by install.sh)
#
# Format: YAML, camelCase keys. pnpm 11 reads non-auth, non-registry settings
# from this file. Empirically verified: kebab-case keys are silently ignored
# in YAML — only camelCase works in config.yaml. (Auth + registry settings
# live in the sibling `rc` file, which DOES use kebab-case INI.)
#
# Per-project overrides go in the project's pnpm-workspace.yaml.
# ------------------------------------------------------------------------------

# Refuse to install packages younger than N minutes. 4320 = 3 days.
# Widens the detection window for publish-and-grab supply-chain attacks
# (Mini Shai-Hulud being the prompt). Emergency bypass per-package via
# `minimumReleaseAgeExclude` in pnpm-workspace.yaml. `pnpm audit --fix`
# auto-adds patched versions to that exclude list.
# pnpm 11 default: 1440 (1 day).
minimumReleaseAge: 4320

# Do NOT let a package with missing registry `time` metadata skip the cooldown.
# The default (true) silently bypasses minimumReleaseAge for any version whose
# packument lacks a publish time -- a metadata-shaped hole straight through the
# 3-day wall. Set false: such a package is BLOCKED rather than waved through.
# Paranoid posture (prefer false positives): a legit package with genuinely
# missing time metadata will fail to install until added to an exclude list.
# pnpm 11 default: true.
minimumReleaseAgeIgnoreMissingTime: false

# Block transitive dependencies that resolve from non-standard sources
# (git repos, direct tarball URLs) rather than the configured registry.
# Top-level deps in package.json can still use exotic sources — this only
# restricts subdeps.
# pnpm 11 default: true. Pinned explicitly to survive future default flips.
blockExoticSubdeps: true

# Validate the package store on each install. Catches corruption or
# tampering of cached tarballs at install time rather than at runtime.
# pnpm 11 default: false.
verifyStoreIntegrity: true

# Refuse to update pnpm-lock.yaml during `pnpm install` unless explicitly
# asked (via `--no-frozen-lockfile`, `pnpm update`, or `pnpm add`).
# Matches CI default — dev and CI now agree on what counts as a lockfile
# change. Prevents accidental drift after a manual package.json edit.
# pnpm 11 default: false in dev, true in CI.
preferFrozenLockfile: true

# Fail the install (non-zero exit) if any dependency ships unreviewed lifecycle
# build scripts (preinstall/install/postinstall) -- the #1 malware delivery
# vector (Rspack, nx, Shai-Hulud all used postinstall/preinstall). Approve
# specific packages with `pnpm approve-builds`, which writes an `allowBuilds`
# map into the project's pnpm-workspace.yaml.
# Already the pnpm 11 default (true); pinned to survive future default flips --
# same rationale as blockExoticSubdeps above.
strictDepBuilds: true

# Never auto-run ALL dependency build scripts. Setting this true reverts to the
# dangerous pre-v10 behavior and disables the build-approval system entirely
# (the "dangerously" in the name is the warning).
# Already the pnpm 11 default (false); pinned defensively.
dangerouslyAllowAllBuilds: false

# Fail the install if a package's trust evidence has WEAKENED versus an earlier
# version, ordered by publish date: trusted-publisher > provenance > nothing.
# This is the only consumer-side install-time signal of weakening publish
# authentication -- e.g. a package normally shipped from CI suddenly pushed from
# a stolen-token laptop with no provenance (the nx / s1ngularity attack class).
# minimumReleaseAge cannot catch that (a malicious version can age out); this can.
# Aborts with ERR_PNPM_TRUST_DOWNGRADE.
# Paranoid posture: enabled with NO trustPolicyIgnoreAfter and NO pre-emptive
# excludes -- false positives are PREFERRED here. Add a specific `name@version`
# to `trustPolicyExclude` ONLY after manually verifying a flagged version is clean.
# pnpm default: off. Added v10.21.0; sharpened in-window by 11.4.0 (provenance
# required before trusted-publisher) and 11.5.0 (staged-publish `approver` ranked top).
trustPolicy: no-downgrade

# NOTE: `strictStorePkgContentCheck` (verify the NAMES/VERSIONS of store packages,
# complementing verifyStoreIntegrity's file-content check) CANNOT be set in this
# global config.yaml -- pnpm warns "cannot be set in the global config file ... were
# ignored" and drops it (verified 2026-06-18, pnpm 11.7.0). It is already the pnpm 11
# default (true), so the check still runs; to PIN it explicitly, set it per-project in
# pnpm-workspace.yaml or via pnpm config dependencies. Left unset here to avoid a
# WARN on every pnpm command.

# Before running any package script (pnpm run / pnpm exec / lifecycle), confirm
# node_modules matches the lockfile. The default `install` SILENTLY auto-installs
# to reconcile drift; `error` instead REFUSES and exits, so a drifted or tampered
# node_modules can never run scripts without an explicit, visible `pnpm install`.
# Paranoid posture: fail closed rather than auto-mutate. Trade-off: a `pnpm run`
# errors when deps are out of sync (run `pnpm install` first). Relax per-project
# with `verifyDepsBeforeRun: install` in that project's pnpm-workspace.yaml.
# pnpm 11 default: install.
verifyDepsBeforeRun: error

# NOTE: `manage-package-manager-versions` (the global flag that would stop
# pnpm from auto-installing itself + @pnpm/exe as deps of every project
# with a `devEngines.packageManager` block) CANNOT be set in this global
# config.yaml — pnpm 11 explicitly rejects it. To disable per-project, add
#     managePackageManagerVersions: false
# to the project's `pnpm-workspace.yaml`. Or use pnpm 11 config dependencies
# to share that setting across projects. See https://pnpm.io/11.x/config-dependencies

# NOTE: pnpm 11.3+ offers `trustLockfile: true` to skip supply-chain
# verification of lockfile entries. Intentionally NOT set -- the default
# (false) keeps minimumReleaseAge + trustPolicy lockfile validation active.
